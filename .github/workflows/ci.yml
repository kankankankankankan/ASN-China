name: Update ASN and IP List

on: 
  push:
  workflow_dispatch:
    inputs:
      target:
        description: "Update target"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - ip
          - base-asn
          - service-asn
          - country-asn
  schedule:
    - cron: "0 16 * * *"

jobs:
  build: 
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - name: Set up Python 3.8
        uses: actions/setup-python@v4
        with:
          python-version: 3.8
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests lxml
      - name: Run Python
        run: |
          TARGET="${{ github.event.inputs.target || 'all' }}"

          if [ "$TARGET" = "all" ] || [ "$TARGET" = "ip" ]; then
            python scripts/IP_CN.py
          fi

          if [ "$TARGET" = "all" ] || [ "$TARGET" = "base-asn" ]; then
            python scripts/ASN_CN.py
            python scripts/ASN_US.py
          fi

          if [ "$TARGET" = "all" ] || [ "$TARGET" = "service-asn" ]; then
            python scripts/ASN_SERVICES.py
          fi

          if [ "$TARGET" = "all" ] || [ "$TARGET" = "country-asn" ]; then
            python scripts/ASN_COUNTRIES.py
          fi
      - uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: Update IP List
